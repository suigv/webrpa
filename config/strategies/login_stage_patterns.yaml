# Default login-stage detection patterns.
#
# Notes:
# - Framework code MUST NOT contain app-specific or locale-specific UI keywords.
# - text_markers are intentionally empty here. The detection system relies on
#   resource_ids as the stable, language-agnostic anchors.
# - When UI patterns are unknown, the system falls back to AI (VLM/LLM) visual
#   inference. This is the correct Architecture 2.0 behavior.
# - Per-app text_markers may be injected via action params: `stage_patterns`,
#   or will be auto-learned by the perception memory system when implemented.
stage_order:
  - captcha
  - two_factor
  - account
  - password
  - login_entry
  - home

stage_patterns:
  captcha:
    resource_ids: []
    text_markers: []
  two_factor:
    resource_ids: []
    text_markers: []
  password:
    resource_ids: []
    text_markers: []
  account:
    resource_ids: []
    text_markers: []
  login_entry:
    resource_ids: []
    text_markers: []
  home:
    resource_ids: []
    text_markers: []
