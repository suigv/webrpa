api_version: v1
kind: plugin
name: follow_interaction
version: "1.0.0"
display_name: "关注与互粉互动"
category: "互动与增长"
description: "Follow interception workflow contract"
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: target_username
    type: string
    required: true
  - name: status_hint
    type: string
    required: false
    default: "runtime"
  - name: package
    type: string
    required: false
    default: "com.twitter.android"
  - name: target_follow_count
    type: integer
    required: false
    default: 5
  - name: follow_result_key
    type: string
    required: false
    default: "follow_last_result"
