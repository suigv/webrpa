version: "v1"
workflow: follow_interaction
steps:
  - label: 确保应用运行中
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package:-com.twitter.android}"

  - label: 导航至关注列表
    kind: action
    action: ui.navigate_to
    params:
      device_ip: "${payload.device_ip}"
      target: "following_list"

  - label: 采集待互动目标
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "follow_targets"
    save_as: target_state

  - label: 随机挑选目标
    kind: action
    action: core.pick_candidate
    params:
      candidates: "${vars.target_state.data.candidates}"
    save_as: selected_target

  - label: 执行关注动作
    kind: action
    action: core.open_candidate
    params:
      device_ip: "${payload.device_ip}"
      candidate: "${vars.selected_target.candidate}"

  - label: 记录互动结果
    kind: action
    action: core.set_vars
    params:
      last_followed: "${vars.selected_target.candidate.text}"

  - label: 关注任务完成
    kind: stop
    status: success
    message: "Follow interaction completed"
