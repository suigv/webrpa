version: "v1"
workflow: blogger_scrape
steps:
  - label: 确保应用运行中
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package:-com.twitter.android}"

  - label: 导航至博主主页
    kind: action
    action: ui.navigate_to
    params:
      device_ip: "${payload.device_ip}"
      target: "profile_view"
      username: "${payload.username}"

  - label: 采集主页元数据
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "profile_metadata"
    save_as: scrape_result

  - label: 提取头像与封面
    kind: action
    action: sdk.extract_media
    params:
      device_ip: "${payload.device_ip}"
      type: "images"

  - label: 保存采集数据
    kind: action
    action: core.save_shared
    params:
      key: "scrape_profile"
      scope: device
      value: "${vars.scrape_result.data}"

  - label: 采集任务成功
    kind: stop
    status: success
    message: "Blogger data scraped"
