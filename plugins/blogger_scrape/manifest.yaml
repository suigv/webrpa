api_version: v1
kind: plugin
name: blogger_scrape
version: "1.0.0"
display_name: "Blogger Scrape"
description: "Prepare scrape output payload for downstream clone workflow"
entry_script: script.yaml
inputs:
  - name: source_key
    type: string
    required: false
    default: "scrape_profile"
  - name: profile
    type: string
    required: false
  - name: username
    type: string
    required: false
    default: "demo_blogger"
  - name: display_name
    type: string
    required: false
    default: "Demo Blogger"
