version: "v1"
workflow: x_reply_dm
steps:
  - label: 解析当前目标容器
    kind: action
    action: selector.resolve_cloud_container
    save_as: cloud_container
    params: {}

  - label: 确保 X App 已启动
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      app_id: "${payload.app_id:-x}"

  - label: 加载私信页 Scheme
    kind: action
    action: core.load_ui_scheme
    save_as: dm_scheme
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      app_id: "${payload.app_id:-x}"
      key: dm_list

  - label: 跳转私信列表页
    kind: action
    action: device.exec
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      command: 'am start -a android.intent.action.VIEW -d "${vars.dm_scheme.url}" &'

  - label: 提取未读私信目标
    kind: action
    action: core.extract_unread_dm_targets
    save_as: dm_targets
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      timeout_ms: 10000
    on_fail:
      strategy: goto
      goto: 任务结束

  - label: 检查是否有未读
    kind: if
    when:
      all:
        - type: var_equals
          var: "vars.dm_targets.count"
          equals: 0
    then: 任务结束
    otherwise: 打开第一条未读私信

  - label: 打开第一条未读私信
    kind: action
    action: core.open_first_unread_dm
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      timeout_ms: 10000
      pin_code: "${payload.pin_code:-1234}"

  - label: 提取最后一条对方消息
    kind: action
    action: core.extract_dm_last_message
    save_as: last_message
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      timeout_ms: 5000

  - label: AI 生成回复
    kind: action
    action: core.generate_dm_reply
    save_as: ai_reply
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      ai_type: "${payload.ai_type:-volc}"
      last_message: "${vars.last_message.message}"

  - label: 输入并发送回复
    kind: action
    action: ui.input_text_with_shell_fallback
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      app_id: "${payload.app_id:-x}"
      selector_key: dm_input
      text: "${vars.ai_reply.reply_text}"
      submit: true

  - label: 加载主页 Scheme
    kind: action
    action: core.load_ui_scheme
    save_as: home_scheme
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      app_id: "${payload.app_id:-x}"
      key: home

  - label: 跳转主页
    kind: action
    action: device.exec
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_index}"
      command: 'am start -a android.intent.action.VIEW -d "${vars.home_scheme.url}" &'

  - label: 任务结束
    kind: stop
    status: success
    message: "私信回复任务完成"
