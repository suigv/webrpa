api_version: v1
kind: plugin
name: x_quote_intercept
version: "1.0.0"
display_name: "X 引用截流"
category: "X"
description: "搜索目标博主的回复流，对未处理用户执行引用发布并记录去重，适用于引用截流引流场景。"
entry_script: script.yaml
distillable: false
visible_in_task_catalog: true
distill_threshold: 3
ai_hints:
  objective: "quote_intercept"
  label: "引用截流"
  task_family: "traffic_capture"
  keywords: ["引用", "quote", "引用截流", "转推评论", "评论截流"]
  plugin_keywords: ["引用", "quote", "截流"]
  requires_account: true
  prefers_branch: true
  needs_shared_resource: true
  expects_keyword_input: false
  expects_reply_strategy: true
  expected_outcome: "围绕目标博主资源执行引用发布并维持去重记录。"
  memory_hints:
    empty_candidate_pool: "最近同类任务缺少可处理候选；下次先补采集结果或切换资源池。"
  distill_policy:
    data_count_keys: ["published_count", "processed_count"]
    data_count_list_keys: ["candidates"]
    completed_rules:
      - reason: "fulfilled_main_path"
        decision: "accepted"
        business_outcome: "fulfilled"
        match_data_count_positive: true
        retained_value: ["draft_memory", "branch_memory", "app_candidate"]
        value_level: "distillable"
      - reason: "empty_candidate_pool"
        business_outcome: "empty"
        match_data_count_present: true
        match_data_count_zero: true
        retained_value: ["draft_memory", "branch_memory"]
        value_level: "replayable"
      - reason: "partial_path_only"
        business_outcome: "partial"
        match_always: true
        retained_value: ["draft_memory", "branch_memory"]
        value_level: "replayable"
inputs:
  - name: app_id
    type: string
    required: false
    default: "x"
    label: "应用 ID"
    advanced: true
  - name: branch_id
    type: string
    required: false
    default: ""
    label: "业务分支"
    widget: select
    options:
      - value: ""
        label: "自动（账号/应用默认）"
      - value: "volc"
        label: "交友"
      - value: "part_time"
        label: "兼职/PayPay"
  - name: max_process
    type: integer
    required: false
    default: 5
    label: "单次最多引用数"
    widget: number
    advanced: true
  - name: max_swipes
    type: integer
    required: false
    default: 10
    label: "最大滑动次数"
    widget: number
    advanced: true
  - name: blogger_shared_key
    type: string
    required: false
    default: "blogger_candidates"
    label: "博主候选键名"
    advanced: true
  - name: processed_shared_key
    type: string
    required: false
    default: "quoted_users"
    label: "已处理用户键名"
    advanced: true
  - name: resource_namespace
    type: string
    required: false
    default: ""
    label: "资源池命名空间"
    description: "留空时默认按当前草稿或应用分支隔离。"
    advanced: true
