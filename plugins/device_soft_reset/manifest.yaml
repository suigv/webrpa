api_version: v1
kind: plugin
name: device_soft_reset
version: "1.0.2"
display_name: "软件复位"
category: "系统维护"
description: >
  针对特定云机内的 App 进行三步走复位：停止 -> 清理 -> 启动。
  如果未指定 package，系统将尝试从当前关联的业务上下文中自动获取。
entry_script: script.yaml
distill_threshold: 3
inputs:
  - name: package
    type: string
    required: false
    description: "目标包名（不填则尝试自动识别）"
  - name: device_ip
    type: string
    required: false
    description: "系统自动注入"
