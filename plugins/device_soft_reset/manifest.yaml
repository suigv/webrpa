api_version: v1
kind: plugin
name: device_soft_reset
version: "1.0.0"
display_name: "Device Soft Reset"
description: >
  Perform lightweight app-level reset and optional cloud restart.
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: package
    type: string
    required: false
    default: "com.twitter.android"
  - name: name
    type: string
    required: true
