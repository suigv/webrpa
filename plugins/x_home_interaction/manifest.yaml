api_version: v1
kind: plugin
name: x_home_interaction
version: "1.0.0"
display_name: "X 主页互动"
category: "X"
description: "强制重启 X 并在主页时间线执行差异化浏览互动：按推文热度决定是否点赞或进入详情停留，模拟真实用户行为。"
entry_script: script.yaml
distillable: false
visible_in_task_catalog: true
distill_threshold: 3
ai_hints:
  objective: "home_interaction"
  label: "主页互动"
  task_family: "ambient_behavior"
  keywords: ["主页互动", "首页互动", "时间线", "点赞浏览", "刷首页", "timeline"]
  plugin_keywords: ["主页互动", "时间线", "互动"]
  requires_account: true
  prefers_branch: true
  needs_shared_resource: false
  expects_keyword_input: false
  expects_reply_strategy: false
  expected_outcome: "在主页时间线执行拟人化浏览与轻互动。"
  distill_policy:
    completed_rules:
      - reason: "fulfilled_main_path"
        decision: "accepted"
        business_outcome: "fulfilled"
        match_always: true
        retained_value: ["draft_memory", "branch_memory"]
        value_level: "distillable"
inputs:
  - name: app_id
    type: string
    required: false
    default: "x"
    label: "应用 ID"
    advanced: true
  - name: branch_id
    type: string
    required: false
    default: ""
    label: "业务分支"
    widget: select
    options:
      - value: ""
        label: "自动（账号/应用默认）"
      - value: "volc"
        label: "交友"
      - value: "part_time"
        label: "兼职/PayPay"
  - name: max_swipes
    type: integer
    required: false
    default: 15
    label: "最大滑动次数"
    widget: number
    advanced: true
