version: "v1"
workflow: profile_clone
steps:
  - label: 确保应用运行中
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package:-com.twitter.android}"

  - label: 读取被克隆数据
    kind: action
    action: core.load_shared
    params:
      key: "scrape_profile"
      scope: device
    save_as: source_data

  - label: 进入资料编辑页
    kind: action
    action: ui.navigate_to
    params:
      device_ip: "${payload.device_ip}"
      target: "profile_edit"

  - label: 同步修改昵称
    kind: action
    action: ui.input
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/edit_name"
      text: "${vars.source_data.value.display_name}"

  - label: 同步修改简介
    kind: action
    action: ui.input
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/edit_bio"
      text: "${vars.source_data.value.description}"

  - label: 上传新头像
    kind: action
    action: sdk.upload_media
    params:
      device_ip: "${payload.device_ip}"
      type: "avatar"

  - label: 保存所有更改
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/save_button"

  - label: 克隆任务成功
    kind: stop
    status: success
    message: "Profile cloned successfully"
