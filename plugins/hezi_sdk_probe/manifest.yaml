api_version: v1
kind: plugin
name: hezi_sdk_probe
version: "1.0.0"
display_name: "盒子 SDK 探测"
category: "设备诊断"
description: "Read-only probe for core heziSDKAPI endpoints through sdk.* atomic actions"
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: sdk_port
    type: integer
    required: false
    default: 8000
  - name: android_name
    type: string
    required: false
    default: ""
