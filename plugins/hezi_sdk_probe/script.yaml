version: "v1"
workflow: hezi_sdk_probe
steps:
  - label: 探测 SDK 服务状态
    kind: action
    action: sdk.ping
    params:
      device_ip: "${payload.device_ip}"

  - label: 获取设备基础信息
    kind: action
    action: sdk.get_device_info
    params:
      device_ip: "${payload.device_ip}"

  - label: 探测任务完成
    kind: stop
    status: success
    message: "SDK probe completed"
