version: "v1"
workflow: nurture
steps:
  - label: 确保应用运行中
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package:-com.twitter.android}"

  - label: 模拟用户随机滑动
    kind: action
    action: ui.swipe
    params:
      device_ip: "${payload.device_ip}"
      direction: "up"
      count: 5

  - label: 模拟查看搜索趋势
    kind: action
    action: ui.navigate_to
    params:
      device_ip: "${payload.device_ip}"
      target: "search_results"

  - label: 浏览搜索内容
    kind: action
    action: ui.swipe
    params:
      device_ip: "${payload.device_ip}"
      direction: "up"
      count: 3

  - label: 随机点击查看详情
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "class"
        value: "android.view.ViewGroup"

  - label: 养号任务完成
    kind: stop
    status: success
    message: "Nurture task completed"
