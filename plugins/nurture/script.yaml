version: v1
workflow: nurture

vars:
  package: "${payload.package:-com.twitter.android}"
  status_hint: "${payload.status_hint:-runtime}"
  ai_type: "${payload.ai_type:-volc}"
  assigned_blogger: "${payload.assigned_blogger:-}"
  keyword_override: "${payload.keyword_override:-}"
  interaction_key: "${payload.interaction_key:-nurture_last_interaction}"

steps:
  - label: check_forced_success
    kind: if
    when:
      all:
        - type: var_equals
          var: status_hint
          equals: success
    then: success

  - label: load_home_scheme
    kind: action
    action: core.load_ui_scheme
    params:
      key: "home"
    save_as: home_scheme

  - label: load_post_like_desc_selector
    kind: action
    action: core.load_ui_selector
    params:
      key: "post.like_button_desc"
    save_as: post_like_desc_selector

  - label: load_post_like_text_selector
    kind: action
    action: core.load_ui_selector
    params:
      key: "post.like_button_text"
    save_as: post_like_text_selector

  - label: check_daily_quota
    kind: action
    action: core.check_daily_limit
    params:
      key: "nurture_daily_count_${vars.ai_type}"
      scope: device
      limit: "${payload.daily_limit:-5}"
    on_fail:
      strategy: goto
      goto: daily_limit_reached

  - label: select_keyword
    kind: action
    action: core.pick_weighted_keyword
    params:
      ai_type: "${vars.ai_type}"
      blogger: "${vars.assigned_blogger}"
      override: "${vars.keyword_override}"
    save_as: selected_keyword
    on_fail:
      strategy: goto
      goto: empty_keyword_pool

  - label: load_search_scheme
    kind: action
    action: core.load_ui_scheme
    params:
      key: "search_query"
      kwargs:
        query: "${vars.selected_keyword.rendered_keyword}"
    save_as: search_scheme
    on_fail:
      strategy: abort

  - label: ensure_running
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${vars.package}"
    on_fail:
      strategy: abort

  - label: open_search_results
    kind: action
    action: device.exec
    params:
      device_ip: "${payload.device_ip}"
      command: "${vars.search_scheme.command}"
    on_fail:
      strategy: abort

  - label: observe_search_candidates
    kind: action
    action: ui.match_state
    params:
      platform: native
      binding_id: search_candidates
      device_ip: "${payload.device_ip}"
      package: "${vars.package}"
      max_candidates: 8
      expected_state_ids:
        - available
        - missing
    save_as: search_candidates
    on_fail:
      strategy: skip

  - label: pick_search_candidate
    kind: action
    action: core.pick_candidate
    params:
      candidates: "${vars.search_candidates.raw_details.candidates}"
      ai_type: "${vars.ai_type}"
    save_as: selected_candidate
    on_fail:
      strategy: skip

  - label: save_selected_candidate
    kind: action
    action: core.save_shared
    params:
      key: "nurture_last_candidate"
      scope: task
      value: "${vars.selected_candidate.candidate}"
    on_fail:
      strategy: skip

  - label: open_selected_candidate
    kind: action
    action: core.open_candidate
    params:
      device_ip: "${payload.device_ip}"
      candidate: "${vars.selected_candidate.candidate}"
    on_fail:
      strategy: skip

  - label: click_like_desc
    kind: action
    action: ui.selector_click_one
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.post_like_desc_selector.type}"
      mode: "${vars.post_like_desc_selector.mode}"
      value: "${vars.post_like_desc_selector.value}"
    on_fail:
      strategy: goto
      goto: click_like_text

  - label: goto_save_nurture_interaction_from_desc
    kind: goto
    target: save_nurture_interaction

  - label: click_like_text
    kind: action
    action: ui.selector_click_one
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.post_like_text_selector.type}"
      mode: "${vars.post_like_text_selector.mode}"
      value: "${vars.post_like_text_selector.value}"
    on_fail:
      strategy: skip

  - label: save_nurture_interaction
    kind: action
    action: core.save_shared
    params:
      key: "${vars.interaction_key}"
      scope: task
      value:
        action: "like"
        keyword: "${vars.selected_keyword.rendered_keyword}"
        candidate: "${vars.selected_candidate.candidate}"
    on_fail:
      strategy: skip

  - label: swipe_feed_1
    kind: action
    action: device.exec
    params:
      device_ip: "${payload.device_ip}"
      command: "input swipe 540 1700 540 760 450"
    on_fail:
      strategy: skip

  - label: swipe_feed_2
    kind: action
    action: device.exec
    params:
      device_ip: "${payload.device_ip}"
      command: "input swipe 540 1650 540 820 500"
    on_fail:
      strategy: skip

  - label: increment_daily_count
    kind: action
    action: core.increment_daily_counter
    params:
      key: "nurture_daily_count_${vars.ai_type}"
      scope: device
      amount: 1
    on_fail:
      strategy: skip

  - label: return_home
    kind: action
    action: device.exec
    params:
      device_ip: "${payload.device_ip}"
      command: "${vars.home_scheme.command}"
    on_fail:
      strategy: skip

  - label: success
    kind: stop
    status: success
    message: "nurture interaction completed"

  - label: daily_limit_reached
    kind: stop
    status: failed
    message: "daily_limit_reached"

  - label: empty_keyword_pool
    kind: stop
    status: failed
    message: "empty_keyword_pool"
