version: "v1"
workflow: x_clone_profile
steps:
  - label: 解析当前目标容器
    kind: action
    action: selector.resolve_cloud_container
    save_as: cloud_container
    params: {}

  - label: 确保 X App 已启动
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"

  - label: 获取目标博主
    kind: action
    action: core.get_blogger_candidate
    save_as: blogger
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      shared_key: "${payload.blogger_shared_key:-blogger_candidates}"

  - label: 加载博主主页 Scheme
    kind: action
    action: core.load_ui_scheme
    save_as: profile_scheme
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      key: profile
      args:
        screen_name: "${vars.blogger.username}"

  - label: 打开博主主页
    kind: action
    action: device.exec
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      command: 'am start -a android.intent.action.VIEW -d "${vars.profile_scheme.url}" &'

  - label: 提取博主资料
    kind: action
    action: core.derive_blogger_profile
    save_as: blogger_profile
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      candidate: "${vars.blogger}"

  - label: 加载编辑资料页 Scheme
    kind: action
    action: core.load_ui_scheme
    save_as: edit_scheme
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      key: edit_profile

  - label: 打开编辑资料页
    kind: action
    action: device.exec
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      command: 'am start -a android.intent.action.VIEW -d "${vars.edit_scheme.url}" &'

  - label: 检查是否俳凒昵称
    kind: if
    when:
      all:
        - type: var_truthy
          var: "payload.clone_name"
    then: 输入昵称
    otherwise: 检查是否俳凒简介

  - label: 输入昵称
    kind: action
    action: ui.input_text_with_shell_fallback
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      selector_key: edit_name_field
      text: "${vars.blogger_profile.display_name}"

  - label: 检查是否俳凒简介
    kind: if
    when:
      all:
        - type: var_truthy
          var: "payload.clone_bio"
    then: 输入简介
    otherwise: 检查是否俳凒网址

  - label: 输入简介
    kind: action
    action: ui.input_text_with_shell_fallback
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      selector_key: edit_bio_field
      text: "${vars.blogger_profile.bio}"

  - label: 检查是否俳凒网址
    kind: if
    when:
      all:
        - type: var_truthy
          var: "payload.clone_website"
    then: 输入网址
    otherwise: 保存资料

  - label: 输入网址
    kind: action
    action: ui.input_text_with_shell_fallback
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      selector_key: edit_website_field
      text: "${vars.blogger_profile.website}"

  - label: 保存资料
    kind: action
    action: ui.click_selector_or_tap
    params:
      device_ip: "${vars.cloud_container.device_ip}"
      cloud_index: "${vars.cloud_container.cloud_id}"
      selector_key: save_profile
