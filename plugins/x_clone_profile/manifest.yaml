api_version: v1
kind: plugin
name: x_clone_profile
version: "1.0.0"
display_name: "X 仿冒博主资料"
category: "X"
description: "抓取目标博主的昵称、简介、网址等文字资料，写入当前账号编辑资料页，实现账号画像仿冒。头像/Banner 图片处理需额外 action 支持，默认跳过。"
entry_script: script.yaml
distillable: false
visible_in_task_catalog: true
distill_threshold: 3
ai_hints:
  objective: "clone_profile"
  label: "仿冒资料"
  task_family: "profile_clone"
  keywords: ["仿冒", "资料", "昵称", "简介", "bio", "profile", "克隆资料", "编辑资料"]
  plugin_keywords: ["仿冒", "资料", "简介", "昵称", "profile"]
  requires_account: true
  prefers_branch: true
  needs_shared_resource: true
  expects_keyword_input: false
  expects_reply_strategy: false
  expected_outcome: "读取目标博主资料并回填当前账号的个人资料字段。"
  distill_policy:
    completed_rules:
      - reason: "fulfilled_main_path"
        decision: "accepted"
        business_outcome: "fulfilled"
        match_terminal_message_present: true
        retained_value: ["draft_memory", "branch_memory", "app_candidate"]
        value_level: "distillable"
      - reason: "partial_path_only"
        business_outcome: "partial"
        match_always: true
        retained_value: ["draft_memory", "branch_memory"]
        value_level: "replayable"
inputs:
  - name: app_id
    type: string
    required: false
    default: "x"
    label: "应用 ID"
    advanced: true
  - name: branch_id
    type: string
    required: false
    default: ""
    label: "业务分支"
    widget: select
    options:
      - value: ""
        label: "自动（账号/应用默认）"
      - value: "volc"
        label: "交友"
      - value: "part_time"
        label: "兼职/PayPay"
  - name: blogger_shared_key
    type: string
    required: false
    default: "blogger_candidates"
    label: "博主候选键名"
    description: "从共享存储读取目标博主的键名。"
    advanced: true
  - name: resource_namespace
    type: string
    required: false
    default: ""
    label: "资源池命名空间"
    description: "留空时默认按当前草稿或应用分支隔离。"
    advanced: true
  - name: clone_bio
    type: boolean
    required: false
    default: true
    label: "仿冒简介"
    widget: checkbox
  - name: clone_name
    type: boolean
    required: false
    default: true
    label: "仿冒昵称"
    widget: checkbox
  - name: clone_website
    type: boolean
    required: false
    default: false
    label: "仿冒网址"
    description: "是否将博主网址也写入资料。"
    widget: checkbox
    advanced: true
