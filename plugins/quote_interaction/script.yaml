version: "v1"
workflow: quote_interaction
steps:
  - label: 确保应用运行中
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package:-com.twitter.android}"

  - label: 导航至首页
    kind: action
    action: ui.navigate_to
    params:
      device_ip: "${payload.device_ip}"
      target: "home_timeline"

  - label: 获取推文列表
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "timeline_candidates"
    save_as: timeline_state

  - label: 随机挑选推文
    kind: action
    action: core.pick_candidate
    params:
      candidates: "${vars.timeline_state.data.candidates}"
    save_as: selected_post

  - label: 点击引用按钮
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/quote_tweet_button"

  - label: 输入引用文字
    kind: action
    action: ui.input
    params:
      device_ip: "${payload.device_ip}"
      text: "${payload.quote_text}"

  - label: 发布引用推文
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/post_button"

  - label: 引用互动完成
    kind: stop
    status: success
    message: "Quote interaction completed"
