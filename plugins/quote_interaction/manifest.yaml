api_version: v1
kind: plugin
name: quote_interaction
version: "1.0.0"
display_name: "引用推文互动"
category: "互动与增长"
description: "Quote interception workflow contract"
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: status_hint
    type: string
    required: false
    default: "runtime"
  - name: package
    type: string
    required: false
    default: "com.twitter.android"
  - name: ai_type
    type: string
    required: false
    default: "default"
  - name: target_post_url
    type: string
    required: false
    default: ""
  - name: target_username
    type: string
    required: false
    default: ""
  - name: source_text
    type: string
    required: false
    default: ""
  - name: quote_text
    type: string
    required: false
    default: ""
  - name: processed_key
    type: string
    required: false
    default: "quoted_targets"
  - name: scope
    type: string
    required: false
    default: "device"
