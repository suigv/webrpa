api_version: v1
kind: plugin
name: x_scrape_blogger
version: "1.0.0"
display_name: "X 采集博主"
category: "X"
description: "通过关键词搜索 X 最新推文，批量采集博主用户名并存入共享候选池，供关注截流、仿冒等任务使用。"
entry_script: script.yaml
distillable: false
visible_in_task_catalog: true
distill_threshold: 3
ai_hints:
  objective: "scrape_blogger"
  label: "采集博主"
  task_family: "resource_collection"
  keywords: ["采集", "收集", "博主", "关键词", "候选", "搜索博主", "采集博主", "blogger", "search"]
  plugin_keywords: ["采集", "博主", "搜索", "候选", "blogger"]
  requires_account: true
  prefers_branch: true
  needs_shared_resource: false
  expects_keyword_input: true
  expects_reply_strategy: false
  expected_outcome: "产出可复用的博主候选池，供后续关注、仿冒或截流任务使用。"
  memory_hints:
    empty_candidate_pool: "最近同类任务缺少可用候选池；下次先补采集结果或切换关键词。"
  distill_policy:
    data_count_keys: ["added_count", "collected", "processed_count"]
    data_count_list_keys: ["candidates"]
    completed_rules:
      - reason: "fulfilled_main_path"
        decision: "accepted"
        business_outcome: "fulfilled"
        match_data_count_positive: true
        retained_value: ["draft_memory", "branch_memory", "app_candidate"]
        value_level: "distillable"
      - reason: "empty_candidate_pool"
        business_outcome: "empty"
        match_data_count_present: true
        match_data_count_zero: true
        retained_value: ["draft_memory", "branch_memory"]
        value_level: "replayable"
      - reason: "partial_path_only"
        business_outcome: "partial"
        match_always: true
        retained_value: ["draft_memory", "branch_memory"]
        value_level: "replayable"
inputs:
  - name: keyword
    type: string
    required: false
    default: ""
    label: "搜索关键词"
    description: "可手动指定；留空时自动从当前业务分支关键词池选择。"
    placeholder: "留空时自动选择，例如 #mytxx"
  - name: branch_id
    type: string
    required: false
    default: ""
    label: "业务分支"
    widget: select
    options:
      - value: ""
        label: "自动（账号/应用默认）"
      - value: "volc"
        label: "交友"
      - value: "part_time"
        label: "兼职/PayPay"
  - name: max_collect
    type: integer
    required: false
    default: 10
    label: "最大采集数量"
    widget: number
    advanced: true
  - name: max_swipes
    type: integer
    required: false
    default: 5
    label: "最大滑动次数"
    widget: number
    advanced: true
  - name: shared_key
    type: string
    required: false
    default: "blogger_candidates"
    label: "共享存储键名"
    advanced: true
  - name: app_id
    type: string
    required: false
    default: "x"
    label: "应用 ID"
    advanced: true
  - name: resource_namespace
    type: string
    required: false
    default: ""
    label: "资源池命名空间"
    description: "留空时默认按当前草稿或应用分支隔离。"
    advanced: true
