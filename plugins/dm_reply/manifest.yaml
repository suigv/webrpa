api_version: v1
kind: plugin
name: dm_reply
version: "1.0.0"
display_name: "私信自动回复"
category: "互动与增长"
description: "DM reply workflow contract"
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: status_hint
    type: string
    required: false
    default: "runtime"
  - name: package
    type: string
    required: false
    default: "com.twitter.android"
  - name: ai_type
    type: string
    required: false
    default: "default"
  - name: reply_text
    type: string
    required: false
    default: ""
  - name: conversation_url
    type: string
    required: false
    default: ""
  - name: last_message_key
    type: string
    required: false
    default: "dm_last_message"
  - name: sent_message_key
    type: string
    required: false
    default: "dm_last_sent_message"
