version: "v1"
workflow: dm_reply
steps:
  - label: 确保应用正在运行
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package:-com.twitter.android}"

  - label: 导航至私信收件箱
    kind: action
    action: ui.navigate_to
    params:
      device_ip: "${payload.device_ip}"
      target: "messages_inbox"

  - label: 采集待回复列表
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "message_candidates"
    save_as: message_state

  - label: 挑选回复目标
    kind: action
    action: core.pick_candidate
    params:
      candidates: "${vars.message_state.data.candidates}"
    save_as: selected_message

  - label: 进入私信会话
    kind: action
    action: core.open_candidate
    params:
      device_ip: "${payload.device_ip}"
      candidate: "${vars.selected_message.candidate}"

  - label: 输入回复内容
    kind: action
    action: ui.input
    params:
      device_ip: "${payload.device_ip}"
      text: "${payload.text}"

  - label: 发送私信
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/dm_send_button"

  - label: 记录回复状态
    kind: action
    action: core.set_vars
    params:
      last_dm_target: "${vars.selected_message.candidate.text}"

  - label: 回复成功退出
    kind: stop
    status: success
    message: "DM reply sent"
