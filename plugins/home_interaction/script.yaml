version: v1
workflow: home_interaction

vars:
  status_hint: "${payload.status_hint:-success}"

steps:
  - label: ensure_running
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package:-com.twitter.android}"
    on_fail:
      strategy: skip

  - label: check_rate_limit
    kind: if
    when:
      all:
        - type: var_equals
          var: status_hint
          equals: rate_limit
    then: rate_limit

  - label: check_empty_target
    kind: if
    when:
      all:
        - type: var_equals
          var: status_hint
          equals: empty_target
    then: empty_target

  - label: success
    kind: stop
    status: success
    message: "home interaction completed"

  - label: rate_limit
    kind: stop
    status: failed
    message: "rate_limit"

  - label: empty_target
    kind: stop
    status: failed
    message: "empty_target"
