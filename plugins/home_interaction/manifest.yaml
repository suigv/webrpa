api_version: v1
kind: plugin
name: home_interaction
version: "1.0.0"
display_name: "首页信息流互动"
category: "互动与增长"
description: "Home feed interaction workflow contract"
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: status_hint
    type: string
    required: false
    default: "runtime"
  - name: package
    type: string
    required: false
    default: "com.twitter.android"
  - name: ai_type
    type: string
    required: false
    default: "volc"
  - name: interaction_counter_key
    type: string
    required: false
    default: "home_interaction_count"
