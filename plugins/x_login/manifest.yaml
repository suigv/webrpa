api_version: v1
kind: plugin
name: x_login
version: "1.0.0"
display_name: "X 登录"
category: "X"
description: "自动完成 X (Twitter) 账号登录流程，包含账号输入、密码输入、TOTP 2FA 验证，并检测是否已登录跳过重复操作。"
entry_script: script.yaml
distillable: false
visible_in_task_catalog: true
distill_threshold: 3
capabilities:
  account_binding: true
  totp_2fa: true
  email_code: false
  sms_code: false
  graphic_captcha: false
  slider_captcha: false
  human_takeover: true
ai_hints:
  objective: "login"
  label: "登录"
  task_family: "account_auth"
  keywords: ["登录", "登陆", "login", "log in", "sign in", "signin", "2fa", "验证码"]
  plugin_keywords: ["登录", "login", "sign in", "signin"]
  requires_account: true
  prefers_branch: false
  needs_shared_resource: false
  expects_keyword_input: false
  expects_reply_strategy: false
  expected_outcome: "账号进入已登录状态并落在可继续操作的主页。"
  distill_policy:
    completed_rules:
      - reason: "fulfilled_main_path"
        decision: "accepted"
        business_outcome: "fulfilled"
        match_always: true
        retained_value: ["draft_memory", "branch_memory"]
        value_level: "distillable"
inputs:
  - name: credentials_ref
    type: string
    required: false
    default: ""
    label: "绑定账号"
    description: "前端账号选择器会写入结构化凭据引用。"
    advanced: true
    system: true
    widget: "hidden"
  - name: app_id
    type: string
    required: false
    default: "x"
    label: "应用 ID"
    advanced: true
  - name: branch_id
    type: string
    required: false
    default: ""
    label: "业务分支"
    advanced: true
  - name: accepted_account_tags
    type: string
    required: false
    default: ""
    label: "账号标签要求"
    description: "多个标签用英文逗号分隔，命中任一标签即可。"
    advanced: true
