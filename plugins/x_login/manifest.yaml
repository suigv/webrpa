api_version: v1
kind: plugin
name: x_login
version: "1.0.0"
display_name: "X 登录"
category: "X"
description: "自动完成 X (Twitter) 账号登录流程，包含账号输入、密码输入、TOTP 2FA 验证，并检测是否已登录跳过重复操作。"
entry_script: script.yaml
distillable: false
visible_in_task_catalog: true
distill_threshold: 3
inputs:
  - name: credentials_ref
    type: string
    required: false
    default: ""
    label: "绑定账号"
    description: "前端账号选择器会写入结构化凭据引用。"
    advanced: true
    system: true
    widget: "hidden"
  - name: app_id
    type: string
    required: false
    default: "x"
    label: "应用 ID"
    advanced: true
  - name: branch_id
    type: string
    required: false
    default: "default"
    label: "业务分支"
    advanced: true
  - name: accepted_account_tags
    type: string
    required: false
    default: ""
    label: "账号标签要求"
    description: "多个标签用英文逗号分隔，命中任一标签即可。"
    advanced: true
