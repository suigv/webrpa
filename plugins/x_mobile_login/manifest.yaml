api_version: v1
kind: plugin
name: x_mobile_login
version: "1.0.0"
display_name: "X 移动端自动登录"
category: "账号与安全"
description: >
  Mobile-oriented X/Twitter login workflow.
  Includes login-entry click, account/password input, submit, and optional 2FA code submit,
  while preserving explicit failure status branches (bad_credentials / 2fa_failed / captcha).
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: package
    type: string
    required: false
    default: "com.twitter.android"
  - name: status_hint
    type: string
    required: false
    default: "runtime"
  - name: acc
    type: string
    required: false
    default: ""
  - name: pwd
    type: string
    required: false
    default: ""
  - name: two_factor_code
    type: string
    required: false
    default: ""
  - name: fa2_secret
    type: string
    required: false
    default: ""
