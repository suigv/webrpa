api_version: v1
kind: plugin
name: x_mobile_login
version: "1.0.0"
display_name: "X Mobile Login"
description: >
  Mobile-oriented login workflow contract with explicit failure status branches
  (bad_credentials / 2fa_failed / captcha) and success path.
entry_script: script.yaml
inputs:
  - name: device_ip
    type: string
    required: true
  - name: package
    type: string
    required: false
    default: "com.twitter.android"
  - name: status_hint
    type: string
    required: false
    default: "success"
