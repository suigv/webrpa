version: "v1"
workflow: x_mobile_login
vars:
  package: "${payload.package:-com.twitter.android}"

steps:
  - label: 确保应用正在运行
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${vars.package}"

  - label: 探测当前登录阶段
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      expected_state_ids: ["login_entry", "account", "password", "home", "two_factor"]
      binding_id: "x_login_stage"
    save_as: login_state

  - label: 分支跳转处理
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: home
    then: 登录成功

  - label: 检查是否在登录入口
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: login_entry
    then: 点击登录按钮

  - label: 检查是否在账号输入页
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: account
    then: 输入账号

  - label: 检查是否在密码输入页
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: password
    then: 输入密码

  - label: 检查是否在2FA验证页
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: two_factor
    then: 处理2FA验证

  - label: 点击登录按钮
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/login_button"
    on_fail:
      strategy: retry
      retries: 2

  - label: 等待账号页加载
    kind: wait_until
    timeout_ms: 5000
    check:
      any:
        - type: ui_state
          binding_id: "x_login_stage"
          expected_state_ids: ["account"]

  - label: 输入账号
    kind: action
    action: ui.input
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "class"
        value: "android.widget.EditText"
      text: "${payload.acc}"

  - label: 下一步
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "text"
        value: "Next"

  - label: 等待密码页加载
    kind: wait_until
    timeout_ms: 5000
    check:
      any:
        - type: ui_state
          binding_id: "x_login_stage"
          expected_state_ids: ["password"]

  - label: 输入密码
    kind: action
    action: ui.input
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "class"
        value: "android.widget.EditText"
      text: "${payload.pwd}"

  - label: 执行登录
    kind: action
    action: ui.click
    params:
      device_ip: "${payload.device_ip}"
      selector:
        type: "resource-id"
        value: "com.twitter.android:id/login_wait_button"

  - label: 等待登录结果
    kind: wait_until
    timeout_ms: 10000
    check:
      any:
        - type: ui_state
          binding_id: "x_login_stage"
          expected_state_ids: ["home", "two_factor"]

  - label: 再次检查状态
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "x_login_stage"
    save_as: final_state

  - label: 登录成功跳转
    kind: if
    when:
      any:
        - type: var_equals
          var: final_state.data.state_id
          equals: home
    then: 登录成功

  - label: 处理2FA验证
    kind: action
    action: ui.input
    params:
      device_ip: "${payload.device_ip}"
      text: "${payload.two_factor_code}"
    # 2FA 逻辑较复杂，此处仅做示范性汉化

  - label: 登录成功
    kind: stop
    status: success
    message: "Login successful"
