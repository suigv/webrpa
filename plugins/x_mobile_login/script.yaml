version: "v1"
workflow: x_mobile_login
vars:
  package: "${payload.package:-com.twitter.android}"

steps:
  - label: 加载登录入口按钮选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.entry_login_btn"
    save_as: login_entry_btn

  - label: 加载已有账号入口选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.entry_existing_account"
    save_as: login_entry_existing

  - label: 加载账号输入选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.input_user"
    save_as: login_input_user

  - label: 加载下一步按钮选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.btn_next"
    save_as: login_btn_next

  - label: 加载密码输入选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.input_password"
    save_as: login_input_password

  - label: 加载登录提交按钮选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.btn_submit_login"
    save_as: login_btn_submit

  - label: 加载2FA输入选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.input_2fa"
    save_as: login_input_2fa

  - label: 加载2FA提交按钮选择器
    kind: action
    action: core.load_ui_selector
    params:
      key: "login.btn_submit_2fa"
    save_as: login_btn_2fa

  - label: 加载登录入口Scheme
    kind: action
    action: core.load_ui_scheme
    params:
      key: "login_flow"
    save_as: login_flow_scheme

  - label: 确保应用正在运行
    kind: action
    action: app.ensure_running
    params:
      device_ip: "${payload.device_ip}"
      package: "${vars.package}"

  - label: 探测当前登录阶段
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      expected_state_ids: ["login_entry", "account", "password", "home", "two_factor"]
      binding_id: "x_login"
    save_as: login_state

  - label: 状态未知尝试直达登录
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: unknown
    then: 打开登录scheme

  - label: 分支跳转处理
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: home
    then: 登录成功

  - label: 检查是否在登录入口
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: login_entry
    then: 点击登录按钮

  - label: 检查是否在账号输入页
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: account
    then: 输入账号

  - label: 检查是否在密码输入页
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: password
    then: 输入密码

  - label: 检查是否在2FA验证页
    kind: if
    when:
      any:
        - type: var_equals
          var: login_state.data.state_id
          equals: two_factor
    then: 处理2FA验证

  - label: 点击登录按钮
    kind: action
    action: ui.selector_click_one
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.login_entry_btn.type}"
      mode: "${vars.login_entry_btn.mode}"
      value: "${vars.login_entry_btn.value}"
    on_fail:
      strategy: goto
      goto: 尝试已有账号入口

  - label: 等待账号页加载
    kind: action
    action: ui.wait_until
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "x_login"
      expected_state_ids: ["account"]
      timeout_ms: 5000

  - label: 输入账号
    kind: action
    action: ui.focus_and_input_with_shell_fallback
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.login_input_user.type}"
      mode: "${vars.login_input_user.mode}"
      value: "${vars.login_input_user.value}"
      text: "${payload.acc}"

  - label: 下一步
    kind: action
    action: ui.selector_click_one
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.login_btn_next.type}"
      mode: "${vars.login_btn_next.mode}"
      value: "${vars.login_btn_next.value}"

  - label: 等待密码页加载
    kind: action
    action: ui.wait_until
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "x_login"
      expected_state_ids: ["password"]
      timeout_ms: 5000

  - label: 输入密码
    kind: action
    action: ui.focus_and_input_with_shell_fallback
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.login_input_password.type}"
      mode: "${vars.login_input_password.mode}"
      value: "${vars.login_input_password.value}"
      text: "${payload.pwd}"

  - label: 执行登录
    kind: action
    action: ui.selector_click_one
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.login_btn_submit.type}"
      mode: "${vars.login_btn_submit.mode}"
      value: "${vars.login_btn_submit.value}"

  - label: 等待登录结果
    kind: action
    action: ui.wait_until
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "x_login"
      expected_state_ids: ["home", "two_factor"]
      timeout_ms: 10000

  - label: 再次检查状态
    kind: action
    action: ui.match_state
    params:
      device_ip: "${payload.device_ip}"
      binding_id: "x_login"
    save_as: final_state

  - label: 登录成功跳转
    kind: if
    when:
      any:
        - type: var_equals
          var: final_state.data.state_id
          equals: home
    then: 登录成功

  - label: 处理2FA验证
    kind: action
    action: ui.focus_and_input_with_shell_fallback
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.login_input_2fa.type}"
      mode: "${vars.login_input_2fa.mode}"
      value: "${vars.login_input_2fa.value}"
      text: "${payload.two_factor_code}"
    # 2FA 逻辑较复杂，此处仅做示范性汉化

  - label: 登录成功
    kind: stop
    status: success
    message: "Login successful"

  - label: 尝试已有账号入口
    kind: action
    action: ui.selector_click_one
    params:
      device_ip: "${payload.device_ip}"
      type: "${vars.login_entry_existing.type}"
      mode: "${vars.login_entry_existing.mode}"
      value: "${vars.login_entry_existing.value}"
    on_fail:
      strategy: goto
      goto: 打开登录scheme

  - label: 回到账号页等待
    kind: goto
    target: 等待账号页加载

  - label: 打开登录scheme
    kind: action
    action: device.exec
    params:
      device_ip: "${payload.device_ip}"
      command: "${vars.login_flow_scheme.command}"

  - label: 回到账号页等待(方案)
    kind: goto
    target: 等待账号页加载
