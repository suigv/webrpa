version: "v1"
workflow: one_click_new_device
steps:
  - label: 解析当前目标容器
    kind: action
    action: selector.resolve_cloud_container
    save_as: cloud_container
    params: {}

  - label: 选择机型
    kind: action
    action: selector.select_phone_model
    save_as: selected_model
    params:
      source: "${payload.model_source}"
      refresh_inventory: "${payload.refresh_inventory}"
      seed: "${payload.seed}"
      filters:
        name_contains: "${payload.phone_model_name_contains}"
        exclude_names:
          - "${vars.cloud_container.selected.modelPath}"

  - label: 生成环境包
    kind: action
    action: generator.generate_env_bundle
    save_as: env_bundle
    params:
      country_profile: "${payload.country_profile}"
      seed: "${payload.seed}"
      contact_count: "${payload.contact_count}"
      language: "${payload.language_override}"
      country: "${payload.country_override}"
      timezone: "${payload.timezone_override}"
      shake_enabled: "${payload.enable_shake}"

  - label: 切换机型
    kind: action
    action: sdk.switch_model
    params:
      name: "${vars.cloud_container.container_name}"
      model_id: "${vars.selected_model.apply.model_id:-}"
      localModel: "${vars.selected_model.apply.local_model:-}"
      countryCode: "${vars.env_bundle.country}"

  - label: 等待云机重启回线
    kind: action
    action: profile.wait_cloud_available
    save_as: availability_wait
    params:
      timeout_ms: 240000
      transition_timeout_ms: 45000
      poll_interval_ms: 1000
      require_cycle: true

  - label: 应用环境包
    kind: action
    action: profile.apply_env_bundle
    save_as: applied_env
    params:
      language: "${vars.env_bundle.language}"
      country: "${vars.env_bundle.country}"
      fingerprint: "${vars.env_bundle.fingerprint}"
      google_adid: "${vars.env_bundle.google_adid}"
      contacts: "${vars.env_bundle.contacts}"
      set_google_id: "${payload.set_google_id}"
      write_contacts: "${payload.write_contacts}"
      shake_enabled: "${payload.enable_shake}"
      take_screenshot: "${payload.take_screenshot}"
      screenshot_level: 2

  - label: 读取切换后机型
    kind: action
    action: selector.resolve_cloud_container
    save_as: final_cloud_container
    params: {}

  - label: 新机完成
    kind: stop
    status: success
    message: "One click new device completed"
    result:
      report:
        title: "一键新机完成"
        before_model: "${vars.cloud_container.selected.modelPath}"
        selected_model: "${vars.selected_model.apply.model_name}"
        after_model: "${vars.final_cloud_container.selected.modelPath}"
        model_source: "${vars.selected_model.source}"
        selector_fallback_used: "${vars.selected_model.fallback_used}"
        generated_language: "${vars.env_bundle.language}"
        generated_country: "${vars.env_bundle.country}"
        generated_timezone: "${vars.env_bundle.timezone}"
        contact_count: "${payload.contact_count}"
        google_id_written: "${payload.set_google_id}"
        contacts_written: "${payload.write_contacts}"
        screenshot_taken: "${payload.take_screenshot}"
