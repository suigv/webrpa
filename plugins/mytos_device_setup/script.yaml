version: "v1"
workflow: mytos_device_setup
steps:
  - label: 检查 root 权限
    kind: action
    action: sdk.check_root
    params:
      device_ip: "${payload.device_ip}"

  - label: 配置系统语言
    kind: action
    action: sdk.set_language
    params:
      device_ip: "${payload.device_ip}"
      language: "${payload.language}"
      country: "${payload.country}"

  - label: 开启应用自启动
    kind: action
    action: sdk.set_app_bootstart
    params:
      device_ip: "${payload.device_ip}"
      package: "${payload.package}"
      enabled: "${payload.enable_app_bootstart}"

  - label: 注入全局配置
    kind: action
    action: sdk.set_global_config
    params:
      device_ip: "${payload.device_ip}"
      config:
        allow_root: "${payload.allow_root}"

  - label: 初始化完成
    kind: stop
    status: success
    message: "Device setup completed"
