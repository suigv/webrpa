version: "v1"
workflow: mytos_device_setup
steps:
  - label: 解析机型选择种子
    kind: action
    action: core.resolve_first_non_empty
    save_as: model_seed_resolved
    params:
      values:
        - "${payload.model_seed}"
        - "${payload.env_seed}"
        - "${payload.cloud_name}"

  - label: 选择机型
    kind: action
    action: selector.select_phone_model
    save_as: selected_model
    params:
      device_ip: "${payload.device_ip}"
      sdk_port: "${payload.sdk_port}"
      source: "${payload.model_source}"
      refresh_inventory: true
      seed: "${vars.model_seed_resolved.value}"
      filters:
        name_contains: "${payload.phone_model_name_contains}"

  - label: 生成环境包
    kind: action
    action: generator.generate_env_bundle
    save_as: env_bundle
    params:
      country_profile: "${payload.country_profile}"
      seed: "${payload.env_seed}"
      contact_count: "${payload.contact_count}"
      language: "${payload.language_override}"
      country: "${payload.country_override}"
      timezone: "${payload.timezone_override}"
      shake_enabled: "${payload.shake_enabled}"

  - label: 切换机型
    kind: action
    action: sdk.switch_model
    params:
      device_ip: "${payload.device_ip}"
      sdk_port: "${payload.sdk_port}"
      name: "${payload.cloud_name}"
      model_id: "${vars.selected_model.apply.model_id:-}"
      localModel: "${vars.selected_model.apply.local_model:-}"

  - label: 配置系统语言
    kind: action
    action: mytos.set_language_country
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      language: "${vars.env_bundle.language}"
      country: "${vars.env_bundle.country}"

  - label: 更新指纹信息
    kind: action
    action: mytos.set_fingerprint
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      data: "${vars.env_bundle.fingerprint}"

  - label: 设置 Google ADID
    kind: action
    action: mytos.set_google_id
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      adid: "${vars.env_bundle.google_adid}"

  - label: 添加联系人
    kind: action
    action: mytos.add_contact
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      contacts: "${vars.env_bundle.contacts}"

  - label: 设置摇一摇
    kind: action
    action: mytos.set_shake
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      enabled: "${vars.env_bundle.shake_enabled}"

  - label: 设置 Root 白名单
    kind: action
    action: mytos.set_root_allowed_app
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      package: "${payload.package}"
      allowed: "${payload.allow_root}"

  - label: 开启应用自启动
    kind: action
    action: mytos.set_app_bootstart
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      package: "${payload.package}"
      enabled: "${payload.enable_app_bootstart}"

  - label: 设置后台保活
    kind: action
    action: mytos.background_keepalive
    params:
      device_ip: "${payload.device_ip}"
      api_port: "${payload.api_port}"
      package: "${payload.package}"
      enabled: "${payload.enable_background_keepalive}"

  - label: 初始化完成
    kind: stop
    status: success
    message: "MYTOS device setup completed"
