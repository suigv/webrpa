# 示例：config/apps/x.yaml（X / Twitter app 配置模板）
# 复制到 config/apps/<app>.yaml 并按实际 app 调整。

version: v1
package_name: com.twitter.android   # 用于 GPT 执行器按 package 匹配此配置

# GPT 执行器 XML 解析参数（可选）
# 有此配置时按指定值截断，无配置时默认 0（不截断）
xml_filter:
  max_text_len: 60
  max_desc_len: 100

# AI 可感知的 UI 状态列表（供 GPT 执行器状态识别使用，可选）
states:
  - id: home
    description: 首页 / 时间线，底部导航栏可见
  - id: profile
    description: 用户个人资料页，显示头像、简介、粉丝数
  - id: followers_list
    description: 粉丝列表页，显示多个用户行及 Follow 按钮
  - id: login_phone_email
    description: 登录页 — 输入手机号或邮箱
  - id: login_password
    description: 登录页 — 输入密码
  - id: unknown
    description: 无法识别的状态

# Deep link / URL scheme（供 navigate.to action 使用，可选）
schemes:
  user_profile: "twitter://user?screen_name={username}"

# UI 选择器（供 core.load_ui_selector action 使用，可选）
selectors:
  follow_button:
    type: text
    mode: equal
    value: Follow
  follow_button_ja:
    type: text
    mode: equal
    value: "フォローする"
