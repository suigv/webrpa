version: "v1"
workflow: ui_navigation_example
steps:
  - label: 打开主页
    kind: action
    action: browser.open
    params:
      url: "${payload.base_url:-https://example.com/}"

  - label: 识别主页
    kind: action
    action: ui.match_state
    params:
      state_profile_id: "browser"
      expected_state_ids:
        - "url:example.com/"

  - label: 导航到资料页
    kind: action
    action: ui.navigate_to
    params:
      target: "profile"
      routes:
        home:
          state_profile_id: "browser"
          platform: "browser"
          current_state_ids:
            - "url:example.com/"
          arrival_state_ids:
            - "url:example.com/"
        profile:
          state_profile_id: "browser"
          platform: "browser"
          current_state_ids:
            - "url:example.com/u/"
          arrival_state_ids:
            - "url:example.com/u/"
      hops:
        - from_route: "home"
          to_route: "profile"
          attempts:
            - action: "browser.open"
              params:
                url: "https://example.com/u/demo"

  - label: 结束
    kind: stop
    status: success
    message: "navigation demo done"
